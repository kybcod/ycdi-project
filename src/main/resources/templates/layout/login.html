<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
		<link rel="icon" href="data:,">
    <meta charset="UTF-8">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <title>로그인</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
          crossorigin="anonymous">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    
</head>
<body>
<div class="container">
    <div class="login-container col-md-4 mx-auto">
        <div class="header text-center">
            <h5>과정형평가 1번 문제</h5>
            <h6>김예빈</h6>
        </div>
        <form th:action="@{/login}" method="post" class="was-validated mt-4">
			    <div class="form-group mb-3">
			        <input type="text" class="form-control" id="id" placeholder="아이디를 입력하세요" name="id"
			               th:value="${loggedId}" required>
			        <div class="invalid-feedback">아이디를 입력해주세요</div>
			    </div>
			    <div class="form-group mb-3">
			        <input type="password" name="password" class="form-control" id="password" placeholder="비밀번호를 입력하세요" required>
			        <div class="invalid-feedback">비밀번호를 입력해주세요</div>
			    </div>
			    <p th:if="${message}" class="text-danger text-center" th:text="${message}"></p>
			    <button type="submit" class="btn btn-primary" id="btn_login" style="width:100%;">로그인</button>
			</form>
    </div>
</div>

<script>
    $(document).ready(function() {
        $('#btn_login').click(function(event) {
            var id = $('#id').val();
            var password = $('#password').val();
            var idPattern = /^[a-zA-Z0-9]+$/;
            var passwordPattern = /^(?=.*[A-Za-z])(?=.*\d)(?=.*[!@#$%^&*()_+])[A-Za-z\d!@#$%^&*()_+]{8,15}$/;

            if (!idPattern.test(id)) {
                alert('아이디는 영문과 숫자만 가능합니다.');
                event.preventDefault(); // 제출 막음
                return;
            }

            if (!passwordPattern.test(password)) {
                alert('비밀번호는 8~15자의 영문, 숫자, 특수문자를 포함해야 합니다.');
                event.preventDefault(); 
                return;
            }
        });
    });
</script>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
</body>
</html>
