<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <link rel="icon" href="data:,">
    <meta charset="UTF-8">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <title>홈</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <script src="https://cdn.jsdelivr.net/npm/quill@2.0.2/dist/quill.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/quill@2.0.2/dist/quill.snow.css" rel="stylesheet">
    <style>
        #membersContainer {
            display: none;
        }
    </style>
</head>
<body class="bg-light">
    <div th:replace="~{fragment/navbar.html :: navbar}"></div>
    <div th:replace="~{fragment/loggedProfile.html :: loggedProfile}"></div>

    <div style="display: flex; gap: 10px;">
        <div>
            <button id="showMembersBtn" class="btn btn-primary w-100">
                <i class="bi"></i> 사용자 목록 보기
            </button>
        </div>
        <div>
            <button id="showBoardBtn" class="btn btn-primary w-100">
                <i class="bi"></i> 게시판 목록 보기
            </button>
        </div>
    </div>

    <div id="membersContainer">
        <div th:replace="~{layout/members.html :: members}"></div>
    </div>

    <div id="boardContainer">
        <!-- <!-- <div th:replace="~{layout/board/boardList.html :: boardList}"></div> -->
        <div>
        	board
        </div>
    </div>

    <div th:replace="~{layout/joinModal.html :: joinModal}"></div>
    <div th:replace="~{layout/detailModal.html :: detailModal}"></div>

    <script th:inline="javascript">
        const loggedMember = /*[[${loggedMember}]]*/ {};

        $(document).ready(function() {
            // 사용자 목록 보기 버튼 클릭
            $('#showMembersBtn').click(function() {
                $('#membersContainer').show();
                $('#boardContainer').hide();
            });

            // 게시판 목록 보기 버튼 클릭
            $('#showBoardBtn').click(function() {
                $('#boardContainer').show();
                $('#membersContainer').hide();
            });
        });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
